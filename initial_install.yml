---
- hosts: all
  become: true
  remote_user: root

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install sudo package
      apt:
        name: sudo
        state: present

  tasks:
    # Create user 'bean' with sudo privileges
    - name: Create user 'bean'
      user:
        name: bean
        groups: sudo
        state: present
        append: yes

    # Add SSH key for user 'bean'
    - name: Add SSH key for user 'bean'
      authorized_key:
        user: bean
        key: "{{ lookup('file', '~/.ssh/ansible.pub') }}"
        state: present

    # Disable root SSH login
    - name: Disable root SSH login
      lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify:
        - restart ssh

    # Disable password login
    - name: Disable password login
      lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify:
        - restart ssh

  handlers:
    - name: restart ssh
      service:
        name: ssh
        state: restarted

