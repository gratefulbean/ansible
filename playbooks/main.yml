----
- hosts: all
  become: true

  pre_tasks:
    - name: update Debian/Ubuntu repositories
      apt:
        update_cache: yes
      changed_when: False

  tasks:
  - name: install packages
    package:
      name:
        - fail2ban

  - name: install updates (Ubuntu)
    tags: always
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_distribution == "debian, Ubuntu"


